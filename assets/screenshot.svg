<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" width="720" height="540" font-family="-apple-system, SF Pro Display, Helvetica, sans-serif">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E2E33"/>
      <stop offset="1" stop-color="#1B1B1F"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="720" height="540" fill="url(#wall)"/>

  <!-- Menu bar strip -->
  <rect x="0" y="0" width="720" height="28" fill="#0E0E12" opacity="0.8"/>
  <text x="14" y="19" font-size="12" fill="#CCCCCC"></text>
  <text x="36" y="19" font-size="12" fill="#CCCCCC" font-weight="600">CaffeinateMenuBar</text>
  <text x="190" y="19" font-size="12" fill="#9A9A9A">File  Edit  View  Window  Help</text>
  <!-- Right side icons -->
  <text x="568" y="19" font-size="12" fill="#9A9A9A">100%</text>
  <text x="612" y="19" font-size="12" fill="#9A9A9A">Wi-Fi</text>
  <!-- Active cup icon -->
  <g transform="translate(660,7) scale(0.085)">
    <path d="M70 110 h100 a8 8 0 0 1 8 8 v40 a40 40 0 0 1 -40 40 h-36 a40 40 0 0 1 -40 -40 v-40 a8 8 0 0 1 8 -8 z" fill="#FF8A8A"/>
    <path d="M178 124 h14 a22 22 0 0 1 0 44 h-14" fill="none" stroke="#FF8A8A" stroke-width="12" stroke-linecap="round"/>
  </g>
  <text x="688" y="19" font-size="12" fill="#CCCCCC">22:51</text>

  <!-- Popover panel -->
  <g transform="translate(412,40)">
    <rect width="296" height="430" rx="14" fill="#1C1C20" stroke="#3A3A40" stroke-width="1" filter="url(#shadow)"/>
    <rect width="296" height="430" rx="14" fill="#1C1C20" stroke="#3A3A40" stroke-width="1"/>

    <!-- Header -->
    <g transform="translate(16,16)">
      <circle cx="14" cy="14" r="14" fill="#3A1A1A"/>
      <g transform="translate(2,2) scale(0.105)">
        <path d="M70 110 h100 a8 8 0 0 1 8 8 v40 a40 40 0 0 1 -40 40 h-36 a40 40 0 0 1 -40 -40 v-40 a8 8 0 0 1 8 -8 z" fill="#FF8A8A"/>
        <path d="M178 124 h14 a22 22 0 0 1 0 44 h-14" fill="none" stroke="#FF8A8A" stroke-width="12" stroke-linecap="round"/>
      </g>
      <text x="40" y="14" font-size="15" font-weight="700" fill="#FFFFFF">Awake</text>
      <text x="40" y="30" font-size="11" fill="#9A9A9A">Ends in 0:42:18</text>
    </g>

    <line x1="14" y1="60" x2="282" y2="60" stroke="#3A3A40"/>

    <!-- Options group -->
    <g transform="translate(16,74)">
      <text font-size="11" fill="#9A9A9A" font-weight="600">OPTIONS</text>
      <g transform="translate(0,14)">
        <!-- row -->
        <g transform="translate(0,0)">
          <rect width="14" height="14" rx="3" fill="#0A84FF"/>
          <path d="M3 7 l3 3 l5 -6" stroke="#FFFFFF" stroke-width="1.6" fill="none"/>
          <text x="24" y="8" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">-d</text>
          <text x="24" y="22" font-size="10" fill="#9A9A9A">ディスプレイのスリープを防ぐ</text>
        </g>
        <g transform="translate(0,36)">
          <rect width="14" height="14" rx="3" fill="#0A84FF"/>
          <path d="M3 7 l3 3 l5 -6" stroke="#FFFFFF" stroke-width="1.6" fill="none"/>
          <text x="24" y="8" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">-i</text>
          <text x="24" y="22" font-size="10" fill="#9A9A9A">システムのアイドルスリープを防ぐ</text>
        </g>
        <g transform="translate(0,72)">
          <rect width="14" height="14" rx="3" fill="none" stroke="#6A6A70"/>
          <text x="24" y="8" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">-m</text>
          <text x="24" y="22" font-size="10" fill="#9A9A9A">ディスクのアイドルスリープを防ぐ</text>
        </g>
        <g transform="translate(0,108)">
          <rect width="14" height="14" rx="3" fill="none" stroke="#6A6A70"/>
          <text x="24" y="8" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">-s</text>
          <text x="24" y="22" font-size="10" fill="#9A9A9A">システムスリープを防ぐ（AC のみ）</text>
        </g>
        <g transform="translate(0,144)">
          <rect width="14" height="14" rx="3" fill="none" stroke="#6A6A70"/>
          <text x="24" y="8" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">-u</text>
          <text x="24" y="22" font-size="10" fill="#9A9A9A">ユーザー操作中を宣言する</text>
        </g>
      </g>
    </g>

    <!-- Duration group -->
    <g transform="translate(16,272)">
      <text font-size="11" fill="#9A9A9A" font-weight="600">DURATION</text>
      <g transform="translate(0,12)">
        <rect width="264" height="26" rx="6" fill="#2A2A30"/>
        <rect x="132" y="0" width="132" height="26" rx="6" fill="#3A3A40"/>
        <text x="66" y="17" font-size="11" text-anchor="middle" fill="#CCCCCC">Until stopped</text>
        <text x="198" y="17" font-size="11" text-anchor="middle" fill="#FFFFFF" font-weight="600">Timer</text>
      </g>
      <g transform="translate(0,52)">
        <rect x="0" y="6" width="200" height="4" rx="2" fill="#3A3A40"/>
        <rect x="0" y="6" width="80" height="4" rx="2" fill="#FF8A8A"/>
        <circle cx="80" cy="8" r="7" fill="#FFFFFF"/>
        <text x="244" y="12" font-size="11" text-anchor="end" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">60 min</text>
      </g>
    </g>

    <!-- Buttons -->
    <g transform="translate(16,360)">
      <rect width="220" height="34" rx="7" fill="#C44545"/>
      <text x="110" y="22" font-size="13" font-weight="600" text-anchor="middle" fill="#FFFFFF">■ Stop</text>
      <rect x="232" width="32" height="34" rx="7" fill="#2A2A30"/>
      <text x="248" y="22" font-size="13" text-anchor="middle" fill="#CCCCCC">⏻</text>
    </g>
  </g>
</svg>
