name: Release to App Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_number:
        description: 'CFBundleVersion override (defaults to GITHUB_RUN_NUMBER)'
        required: false

permissions:
  contents: write

jobs:
  appstore:
    name: fastlane release
    runs-on: macos-14
    environment: appstore
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
      FASTLANE_HIDE_CHANGELOG: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      APP_IDENTIFIER: com.akidon0000.CaffeinateMenuBar
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      MATCH_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
      BUILD_NUMBER: ${{ inputs.build_number }}

    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run fastlane release lane
        run: bundle exec fastlane mac release

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: appstore-${{ github.ref_name }}-${{ github.run_number }}
          path: |
            build/CaffeinateMenuBar.xcarchive
            build/export
          retention-days: 14
