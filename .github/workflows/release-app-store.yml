name: Release to App Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_number:
        description: 'CFBundleVersion (build number). Defaults to GITHUB_RUN_NUMBER.'
        required: false

permissions:
  contents: write

jobs:
  appstore:
    name: Build, sign, and upload to App Store Connect
    runs-on: macos-14
    environment: appstore
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ──────────────────────────────────────────────────────────────────
      # Code signing setup
      # ──────────────────────────────────────────────────────────────────
      # Required GitHub Actions secrets:
      #   APPLE_TEAM_ID                       — 10-char Team ID
      #   BUILD_CERTIFICATE_BASE64            — base64 of Apple Distribution .p12
      #   P12_PASSWORD                        — password for the .p12
      #   PROVISIONING_PROFILE_BASE64         — base64 of Mac App Store .provisionprofile
      #   KEYCHAIN_PASSWORD                   — ephemeral keychain pw (any string)
      #   APP_STORE_CONNECT_KEY_ID            — API Key ID (e.g. ABCDE12345)
      #   APP_STORE_CONNECT_ISSUER_ID         — App Store Connect issuer UUID
      #   APP_STORE_CONNECT_KEY_BASE64        — base64 of the AuthKey_*.p8 file
      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH=$RUNNER_TEMP/profile.provisionprofile
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<<"$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".provisionprofile
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      # ──────────────────────────────────────────────────────────────────
      # Versioning
      # ──────────────────────────────────────────────────────────────────
      - name: Compute version numbers
        id: ver
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME:-}"
          if [[ "$REF" == v* ]]; then
            MARKETING="${REF#v}"
          else
            MARKETING=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" \
              build/Build/Products/Release/CaffeinateMenuBar.app/Contents/Info.plist 2>/dev/null || echo "1.0.0")
          fi
          BUILD="${{ inputs.build_number }}"
          BUILD="${BUILD:-$GITHUB_RUN_NUMBER}"
          echo "marketing=$MARKETING" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────────────────────────
      # Archive + export for App Store
      # ──────────────────────────────────────────────────────────────────
      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project CaffeinateMenuBar.xcodeproj \
            -scheme CaffeinateMenuBar \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/CaffeinateMenuBar.xcarchive \
            MARKETING_VERSION=${{ steps.ver.outputs.marketing }} \
            CURRENT_PROJECT_VERSION=${{ steps.ver.outputs.build }} \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=$PROVISIONING_PROFILE_UUID \
            archive | xcbeautify

      - name: Export App Store .pkg
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath build/CaffeinateMenuBar.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist .github/ExportOptions-AppStore.plist | xcbeautify

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

          PKG=$(ls build/export/*.pkg | head -n1)
          echo "Uploading $PKG"
          xcrun altool --upload-app \
            --type macos \
            --file "$PKG" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: appstore-${{ steps.ver.outputs.marketing }}-${{ steps.ver.outputs.build }}
          path: |
            build/CaffeinateMenuBar.xcarchive
            build/export
          retention-days: 14

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
