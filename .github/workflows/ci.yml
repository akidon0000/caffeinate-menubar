name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Release, ad-hoc)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project CaffeinateMenuBar.xcodeproj \
            -scheme CaffeinateMenuBar \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify
        env:
          NSUnbufferedIO: YES

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: CaffeinateMenuBar-unsigned-${{ github.sha }}
          path: build/Build/Products/Release/CaffeinateMenuBar.app
          if-no-files-found: error
          retention-days: 7
