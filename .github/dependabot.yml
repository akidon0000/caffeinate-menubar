version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - fastlane
    groups:
      fastlane:
        patterns:
          - "fastlane*"
          - "xcodeproj"

  # Swift Package Manager is not currently used (no Package.resolved).
  # If/when SPM dependencies are introduced, uncomment:
  # - package-ecosystem: swift
  #   directory: /
  #   schedule:
  #     interval: weekly
  #   open-pull-requests-limit: 5
